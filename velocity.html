<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Video Preview</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            text-align: center;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* Isse preview ka container bada dikhega */
            max-width: 850px; 
            width: 100%;
        }

        h1 {
            color: #ff4757;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .video-wrapper {
            margin-bottom: 25px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #333;
        }

        /* Video ka bada size set kiya hai yahan */
        video {
            width: 100%;
            max-width: 800px;
            display: block;
            height: auto;
        }

        .btn-download {
            display: inline-block;
            background-color: #2ed573;
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4);
        }

        .btn-download:hover {
            background-color: #26af5f;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(46, 213, 115, 0.6);
        }

        .btn-download:active {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Velocity Video Preview</h1>
        
        <div class="video-wrapper">
            <video controls poster="">
                <source src="list/dust.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <a href="list/dust.mp4" download="dust.mp4" class="btn-download">
            📥 Download Video
        </a>
    </div>

</body>
</html>
